<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      width: 160px;
      height: 160px;
      background: transparent;
      overflow: hidden;
    }
    #pet {
      width: 160px;
      height: 160px;
      object-fit: contain;
      image-rendering: pixelated;   /* 像素风保持锐利 */
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <img id="pet" alt="pet" />

  <script>
    const character = 'zoro';   // 想换角色改这里

    const ANIM = {
      scratch: { count: 6, fps: 8 },   // 待机小动作
      walk:    { count: 8, fps: 10 },  // 走路
    };

    function framePaths(action) {
      const paths = [];
      for (let i = 1; i <= ANIM[action].count; i++) {
        paths.push(`assets/${character}/frames/${action}/${String(i).padStart(2, '0')}.png`);
      }
      return paths;
    }

    // 预加载成 Image 对象，既防闪烁，也供命中检测画到画布上用
    const allImg = {};
    for (const action in ANIM) {
      allImg[action] = framePaths(action).map((src) => { const img = new Image(); img.src = src; return img; });
    }

    const petImg = document.getElementById('pet');
    let timer = null;
    let currentAction = null;
    let currentImg = null;
    let flipped = false;
    let paused = false;

    // 离屏画布：把当前帧画上去，用来判断光标下的像素是否透明
    const canvas = document.createElement('canvas');
    canvas.width = 160; canvas.height = 160;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function drawHitFrame() {
      if (!currentImg || !currentImg.complete) return;
      ctx.clearRect(0, 0, 160, 160);
      ctx.drawImage(currentImg, 0, 0, 160, 160);
    }

    let frameIndex = 0;

    // 按当前动作开始/恢复逐帧播放（暂停时不启动）
    function startTicking() {
      if (timer) { clearInterval(timer); timer = null; }
      if (paused || !currentAction) return;
      const imgs = allImg[currentAction];
      const fps = ANIM[currentAction].fps;
      const tick = () => {
        currentImg = imgs[frameIndex];
        petImg.src = currentImg.src;
        drawHitFrame();
        frameIndex = (frameIndex + 1) % imgs.length;
      };
      tick();
      timer = setInterval(tick, 1000 / fps);
    }

    function play(action, facing) {
      if (facing === 'left')  { petImg.style.transform = 'scaleX(-1)'; flipped = true; }
      if (facing === 'right') { petImg.style.transform = 'scaleX(1)';  flipped = false; }
      // facing 为 null（待机/拖动）时保持上一次朝向

      if (action === currentAction) return;
      currentAction = action;
      frameIndex = 0;
      startTicking();
    }

    window.pet.onAnim(({ action, facing }) => play(action, facing));

    // 暂停 / 继续
    window.pet.onSetPaused((p) => {
      paused = p;
      if (paused) { if (timer) { clearInterval(timer); timer = null; } }
      else { startTicking(); }
    });

    // ===== 命中检测：光标下是不是身体（不透明像素）=====
    const ALPHA_THRESHOLD = 10;
    let lastInteractive = null;

    function isOnBody(clientX, clientY) {
      let x = Math.floor(clientX);
      let y = Math.floor(clientY);
      if (x < 0 || x > 159 || y < 0 || y > 159) return false;
      if (flipped) x = 159 - x;          // 显示翻转了，采样也要镜像
      try {
        const alpha = ctx.getImageData(x, y, 1, 1).data[3];
        return alpha > ALPHA_THRESHOLD;
      } catch (e) {
        return true;                     // 万一读不了像素，宁可可拖也不卡死
      }
    }

    let isDragging = false;

    document.addEventListener('mousemove', (e) => {
      if (isDragging) return;            // 拖动中由主进程接管，不再切换穿透
      const onBody = isOnBody(e.clientX, e.clientY);
      if (onBody !== lastInteractive) {
        lastInteractive = onBody;
        window.pet.setInteractive(onBody);   // 在身体上=可交互，否则穿透到桌面
      }
    });

    document.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (isOnBody(e.clientX, e.clientY)) {
        isDragging = true;
        window.pet.dragStart();
      }
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        window.pet.dragEnd();
      }
    });

    // 在身体上右键 -> 弹出原生菜单（点透明处不拦截）
    document.addEventListener('contextmenu', (e) => {
      if (isOnBody(e.clientX, e.clientY)) {
        e.preventDefault();
        window.pet.showMenu();
      }
    });
  </script>
</body>
</html>
