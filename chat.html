<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font: 14px/1.4 -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      color: #111;
      background: #ffffff;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* 顶部标题栏：可拖动窗口，留出左侧红绿灯按钮的位置 */
    .titlebar {
      -webkit-app-region: drag;
      height: 52px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 70px;
      padding-right: 70px;
      border-bottom: 1px solid #ececec;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
    }
    .titlebar .name { font-weight: 600; font-size: 15px; }
    .titlebar .sub { font-size: 11px; color: #8e8e93; margin-top: 1px; }
    .titlebar .center { display: flex; flex-direction: column; align-items: center; }

    /* 消息区 */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #ffffff;
    }
    .row { display: flex; align-items: flex-end; gap: 8px; margin-top: 6px; }
    .row.sent { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f0f0f3 center/cover no-repeat;
      flex: 0 0 auto;
      image-rendering: pixelated;
    }
    .row.sent .avatar { visibility: hidden; }  /* 自己的消息不显示头像，但占位保持对齐 */

    .bubble {
      max-width: 66%;
      padding: 8px 13px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .row.received .bubble {
      background: #e9e9eb;
      color: #111;
      border-bottom-left-radius: 5px;
    }
    .row.sent .bubble {
      background: linear-gradient(180deg, #1f93ff 0%, #0a7cff 100%);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    /* 底部输入栏 */
    .composer {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ececec;
      background: #fafafa;
    }
    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      max-height: 96px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid #d8d8dc;
      border-radius: 18px;
      font: inherit;
      font-size: 15px;
      outline: none;
      background: #fff;
      -webkit-user-select: text;
      user-select: text;
    }
    .composer textarea:focus { border-color: #0a7cff; }
    .send {
      flex: 0 0 auto;
      width: 36px; height: 36px;
      border: none;
      border-radius: 50%;
      background: #0a7cff;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, opacity .15s;
    }
    .send:disabled { background: #c7c7cc; cursor: default; }
    .send:not(:disabled):active { background: #0860c4; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="center">
      <div class="name">Zoro</div>
      <div class="sub">桌面宠物</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="composer">
    <textarea id="input" placeholder="发消息…" rows="1"></textarea>
    <button class="send" id="send" disabled>↑</button>
  </div>

  <script>
    const AVATAR = 'assets/zoro/frames/wave/01.png';
    const TYPE_MS = 28;   // 打字机吐字间隔（毫秒），越小打得越快

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // 对话历史（发给 AI 的上下文；开场白只是界面，不进历史）
    const history = [];

    // 加一条普通消息气泡，返回气泡元素
    function addMessage(text, who) {  // who: 'sent' | 'received'
      const row = document.createElement('div');
      row.className = 'row ' + who;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      if (who === 'received') avatar.style.backgroundImage = `url("${AVATAR}")`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    // ===== 打字机：流式分块 -> 逐字队列 =====
    let typeQueue = [];        // 待显示的字符
    let typeTimer = null;
    let streaming = false;     // 是否正在接收 AI 回复
    let streamDone = false;    // 服务端是否已结束
    let currentBubble = null;  // 正在被打字的气泡
    let assistantText = '';    // 本轮回复完整文本（用于存入历史）

    function startTyping() {
      if (typeTimer) return;
      typeTimer = setInterval(() => {
        if (typeQueue.length > 0) {
          currentBubble.textContent += typeQueue.shift();
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (streamDone) {
          // 队列吐完且服务端结束 -> 收尾
          clearInterval(typeTimer); typeTimer = null;
          finishStreaming();
        }
      }, TYPE_MS);
    }

    function finishStreaming() {
      if (assistantText) history.push({ role: 'assistant', content: assistantText });
      streaming = false;
      currentBubble = null;
      updateSendState();
      inputEl.focus();
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;

      addMessage(text, 'sent');
      history.push({ role: 'user', content: text });
      inputEl.value = '';
      autoGrow();

      // 准备接收回复
      streaming = true;
      streamDone = false;
      assistantText = '';
      typeQueue = [];
      currentBubble = addMessage('', 'received');
      currentBubble.classList.add('typing');
      currentBubble.textContent = '…';
      updateSendState();

      window.chatApi.send(history);
    }

    window.chatApi.onDelta((textChunk) => {
      if (!currentBubble) return;
      if (currentBubble.classList.contains('typing')) {   // 第一段到了，清掉占位
        currentBubble.classList.remove('typing');
        currentBubble.textContent = '';
      }
      assistantText += textChunk;
      for (const ch of textChunk) typeQueue.push(ch);
      startTyping();
    });

    window.chatApi.onDone(() => {
      streamDone = true;
      startTyping();   // 万一回复很短、还没启动打字机
    });

    window.chatApi.onError((payload) => {
      const code = payload && payload.code;
      if (currentBubble) currentBubble.remove();   // 去掉占位气泡
      currentBubble = null;
      if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
      streaming = false;
      streamDone = true;

      if (code === 'NO_KEY') {
        const m = addMessage('还没填 API Key。右键菜单 →「设置…」填一下就能聊啦~', 'received');
        m.parentElement.dataset.hint = '1';   // 标记成提示，配置好后自动清掉
        window.chatApi.openSettings();         // 顺手帮你打开设置
      } else {
        addMessage('（出错了）' + (payload && payload.message ? payload.message : '未知错误'), 'received');
      }
      // 出错这轮不算数，把刚加的 user 消息留在历史里也无妨，下次重发会带上
      updateSendState();
    });

    function updateSendState() {
      sendBtn.disabled = streaming || inputEl.value.trim().length === 0;
    }
    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 96) + 'px';
    }

    inputEl.addEventListener('input', () => { updateSendState(); autoGrow(); });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener('click', send);

    // 配置保存后：清掉「未配置」提示，给个确认
    window.chatApi.onConfigUpdated(() => {
      document.querySelectorAll('.row[data-hint]').forEach((el) => el.remove());
      addMessage('配置好啦，发消息试试吧~', 'received');
    });

    // 开场白 + 没配置时的提示
    addMessage('嗨，有什么想聊的？', 'received');
    (async () => {
      const ok = await window.chatApi.hasKey();
      if (!ok) {
        const m = addMessage('（还没配置 API Key——右键菜单 →「设置…」填一下就能聊真 AI 了）', 'received');
        m.parentElement.dataset.hint = '1';
      }
    })();
    inputEl.focus();
  </script>
</body>
</html>
