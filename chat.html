<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font: 14px/1.4 -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      color: #111;
      background: #ffffff;
      -webkit-user-select: none;
      user-select: none;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* 顶部标题栏：可拖动窗口，留出左侧红绿灯按钮的位置 */
    .titlebar {
      -webkit-app-region: drag;
      height: 52px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 70px;
      padding-right: 70px;
      border-bottom: 1px solid #ececec;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
    }
    .titlebar .name { font-weight: 600; font-size: 15px; }
    .titlebar .sub { font-size: 11px; color: #8e8e93; margin-top: 1px; }
    .titlebar .center { display: flex; flex-direction: column; align-items: center; }

    /* 消息区 */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #ffffff;
    }
    .row { display: flex; align-items: flex-end; gap: 8px; margin-top: 6px; }
    .row.sent { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #f0f0f3 center/cover no-repeat;
      flex: 0 0 auto;
      image-rendering: pixelated;
    }
    .row.sent .avatar { visibility: hidden; }  /* 自己的消息不显示头像，但占位保持对齐 */

    .bubble {
      max-width: 66%;
      padding: 8px 13px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .row.received .bubble {
      background: #e9e9eb;
      color: #111;
      border-bottom-left-radius: 5px;
    }
    .row.sent .bubble {
      background: linear-gradient(180deg, #1f93ff 0%, #0a7cff 100%);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    /* 底部输入栏 */
    .composer {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ececec;
      background: #fafafa;
    }
    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      max-height: 96px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid #d8d8dc;
      border-radius: 18px;
      font: inherit;
      font-size: 15px;
      outline: none;
      background: #fff;
      -webkit-user-select: text;
      user-select: text;
    }
    .composer textarea:focus { border-color: #0a7cff; }
    .send {
      flex: 0 0 auto;
      width: 36px; height: 36px;
      border: none;
      border-radius: 50%;
      background: #0a7cff;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, opacity .15s;
    }
    .send:disabled { background: #c7c7cc; cursor: default; }
    .send:not(:disabled):active { background: #0860c4; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="center">
      <div class="name">Zoro</div>
      <div class="sub">桌面宠物</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="composer">
    <textarea id="input" placeholder="发消息…" rows="1"></textarea>
    <button class="send" id="send" disabled>↑</button>
  </div>

  <script>
    const AVATAR = 'assets/zoro/frames/wave/01.png';
    const REPLY = '我收到啦';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, who) {  // who: 'sent' | 'received'
      const row = document.createElement('div');
      row.className = 'row ' + who;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      if (who === 'received') avatar.style.backgroundImage = `url("${AVATAR}")`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'sent');
      inputEl.value = '';
      autoGrow();
      updateSendState();
      // 桌宠固定回复（先不接真 AI）
      setTimeout(() => addMessage(REPLY, 'received'), 500);
    }

    function updateSendState() {
      sendBtn.disabled = inputEl.value.trim().length === 0;
    }
    function autoGrow() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 96) + 'px';
    }

    inputEl.addEventListener('input', () => { updateSendState(); autoGrow(); });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {   // 回车发送，Shift+回车换行
        e.preventDefault();
        send();
      }
    });
    sendBtn.addEventListener('click', send);

    // 开场白
    addMessage('嗨，有什么想聊的？', 'received');
    inputEl.focus();
  </script>
</body>
</html>
